<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Music Personality</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0b08;
      --cream: #f0e6c8;
      --amber: #c8873a;
      --amber-light: #e8a85a;
      --red: #8b2a2a;
      --groove: #1a1610;
      --muted: #6b6050;
      --border: #2a2218;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--cream);
      font-family: 'Crimson Pro', serif;
      min-height: 100vh;
      overflow-x: hidden;
      cursor: none;
    }

    /* Custom cursor */
    .cursor {
      position: fixed;
      width: 12px;
      height: 12px;
      background: var(--amber);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform 0.1s ease;
      mix-blend-mode: difference;
    }

    .cursor-ring {
      position: fixed;
      width: 36px;
      height: 36px;
      border: 1px solid var(--amber);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: all 0.15s ease;
      opacity: 0.5;
    }

    /* Grain overlay */
    .grain {
      position: fixed;
      inset: -50%;
      width: 200%;
      height: 200%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.04;
      pointer-events: none;
      z-index: 100;
      animation: grainShift 0.5s steps(2) infinite;
    }

    @keyframes grainShift {
      0% { transform: translate(0, 0); }
      25% { transform: translate(-2%, -3%); }
      50% { transform: translate(3%, 1%); }
      75% { transform: translate(-1%, 4%); }
      100% { transform: translate(2%, -2%); }
    }

    /* Vinyl record background animation */
    .vinyl-bg {
      position: fixed;
      right: -20vw;
      top: 50%;
      transform: translateY(-50%);
      width: 70vw;
      height: 70vw;
      max-width: 700px;
      max-height: 700px;
      opacity: 0.04;
      animation: slowSpin 30s linear infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes slowSpin {
      from { transform: translateY(-50%) rotate(0deg); }
      to { transform: translateY(-50%) rotate(360deg); }
    }

    /* Floating dust particles */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: var(--amber);
      border-radius: 50%;
      opacity: 0;
      animation: float linear infinite;
    }

    @keyframes float {
      0% { opacity: 0; transform: translateY(100vh) translateX(0); }
      10% { opacity: 0.6; }
      90% { opacity: 0.3; }
      100% { opacity: 0; transform: translateY(-10vh) translateX(30px); }
    }

    /* Scanlines */
    .scanlines {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 99;
    }

    /* Page sections */
    .page {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    .page.active { opacity: 1; }
    .page.hidden { display: none; }

    /* ===== LOGIN PAGE ===== */
    .login-page {
      text-align: center;
      max-width: 600px;
      margin: 0 auto;
    }

    .tape-label {
      display: inline-block;
      background: var(--amber);
      color: var(--bg);
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      padding: 0.3rem 1rem;
      margin-bottom: 2.5rem;
      position: relative;
    }

    .tape-label::before,
    .tape-label::after {
      content: '';
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 100%;
      background: var(--amber);
      opacity: 0.3;
    }

    .tape-label::before { right: 100%; }
    .tape-label::after { left: 100%; }

    .main-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(4rem, 12vw, 8rem);
      letter-spacing: 0.05em;
      line-height: 0.9;
      color: var(--cream);
      margin-bottom: 0.5rem;
      animation: titleReveal 1s ease both;
    }

    .main-title span {
      color: var(--amber);
      display: block;
    }

    @keyframes titleReveal {
      from { opacity: 0; transform: translateY(40px) skewY(2deg); }
      to { opacity: 1; transform: translateY(0) skewY(0); }
    }

    .subtitle {
      font-size: 1.1rem;
      font-style: italic;
      color: var(--muted);
      margin-bottom: 3rem;
      letter-spacing: 0.05em;
      animation: fadeUp 1s 0.3s ease both;
    }

    /* Vinyl record illustration */
    .vinyl-record {
      width: 200px;
      height: 200px;
      margin: 0 auto 3rem;
      position: relative;
      animation: fadeUp 1s 0.1s ease both;
    }

    .vinyl-record svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 30px rgba(200, 135, 58, 0.2));
    }

    .vinyl-record .needle {
      position: absolute;
      top: -10px;
      right: -20px;
      width: 60px;
      height: 60px;
      animation: needleDrop 1s 1.5s ease both;
      transform-origin: top right;
    }

    @keyframes needleDrop {
      from { transform: rotate(-30deg); }
      to { transform: rotate(0deg); }
    }

    .login-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      background: var(--cream);
      color: var(--bg);
      padding: 1rem 2.5rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      border: none;
      cursor: none;
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
      animation: fadeUp 1s 0.5s ease both;
    }

    .login-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--amber);
      transform: translateX(-100%);
      transition: transform 0.3s ease;
    }

    .login-btn:hover::before { transform: translateX(0); }
    .login-btn span { position: relative; z-index: 1; }
    .login-btn svg { position: relative; z-index: 1; }

    .fine-print {
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: var(--muted);
      font-style: italic;
      animation: fadeUp 1s 0.7s ease both;
    }

    /* Decorative lines */
    .deco-line {
      width: 60px;
      height: 1px;
      background: var(--amber);
      margin: 1.5rem auto;
      opacity: 0.5;
    }

    /* ===== LOADING PAGE ===== */
    .loading-page {
      text-align: center;
    }

    .turntable {
      width: 200px;
      height: 200px;
      margin: 0 auto 2rem;
      position: relative;
    }

    .turntable-vinyl {
      width: 100%;
      height: 100%;
      animation: spin 2s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .loading-text {
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--amber);
      animation: blink 1.5s ease infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .loading-subtext {
      margin-top: 0.75rem;
      font-style: italic;
      color: var(--muted);
      font-size: 0.95rem;
    }

    /* ===== RESULT PAGE ===== */
    .result-page {
      max-width: 640px;
      width: 100%;
      margin: 0 auto;
      gap: 1.5rem;
      display: none;
      flex-direction: column;
    }

    .result-page.active {
      display: flex;
    }

    /* Personality card */
    .personality-card {
      background: var(--groove);
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
      padding: 0;
    }

    .card-header {
      background: var(--amber);
      padding: 0.6rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-header-text {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--bg);
    }

    .card-holes {
      display: flex;
      gap: 6px;
    }

    .card-hole {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--bg);
      opacity: 0.4;
    }

    .card-body {
      padding: 2.5rem;
      position: relative;
    }

    /* Vinyl grooves background */
    .card-body::before {
      content: '';
      position: absolute;
      right: -60px;
      top: 50%;
      transform: translateY(-50%);
      width: 200px;
      height: 200px;
      border-radius: 50%;
      border: 1px solid rgba(200, 135, 58, 0.08);
      box-shadow:
        0 0 0 20px rgba(200, 135, 58, 0.04),
        0 0 0 40px rgba(200, 135, 58, 0.03),
        0 0 0 60px rgba(200, 135, 58, 0.02);
      pointer-events: none;
    }

    .card-emoji {
      font-size: 3rem;
      display: block;
      margin-bottom: 1.5rem;
      animation: popIn 0.6s 0.3s ease both;
    }

    @keyframes popIn {
      from { transform: scale(0.5) rotate(-10deg); opacity: 0; }
      to { transform: scale(1) rotate(0); opacity: 1; }
    }

    .card-type {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--amber);
      margin-bottom: 0.75rem;
    }

    .card-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.5rem, 6vw, 4rem);
      letter-spacing: 0.05em;
      color: var(--cream);
      line-height: 1;
      margin-bottom: 1.5rem;
      animation: slideIn 0.8s 0.4s ease both;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .card-description {
      font-size: 1.05rem;
      line-height: 1.85;
      color: #a89880;
      font-weight: 300;
      animation: fadeUp 0.8s 0.6s ease both;
    }

    .card-footer {
      border-top: 1px solid var(--border);
      padding: 1rem 2.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-footer-text {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    .rpm-badge {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      color: var(--amber);
      border: 1px solid var(--amber);
      padding: 0.2rem 0.5rem;
      letter-spacing: 0.1em;
      opacity: 0.7;
    }

    /* Tracks section */
    .tracks-card {
      background: var(--groove);
      border: 1px solid var(--border);
      overflow: hidden;
      animation: fadeUp 0.8s 0.8s ease both;
    }

    .tracks-header {
      padding: 0.75rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .tracks-header-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--red);
      box-shadow: 0 0 8px var(--red);
      animation: pulse 2s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 8px var(--red); }
      50% { opacity: 0.5; box-shadow: 0 0 4px var(--red); }
    }

    .tracks-header-text {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .track-list { padding: 0.5rem 0; }

    .track-item {
      display: grid;
      grid-template-columns: 2rem 1fr auto;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem 1.5rem;
      border-bottom: 1px solid rgba(42, 34, 24, 0.5);
      transition: background 0.2s ease;
      animation: fadeUp 0.5s ease both;
    }

    .track-item:last-child { border-bottom: none; }
    .track-item:hover { background: rgba(200, 135, 58, 0.05); }

    .track-num {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: var(--amber);
      text-align: right;
    }

    .track-info { overflow: hidden; }

    .track-name {
      font-size: 0.95rem;
      color: var(--cream);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-artist {
      font-size: 0.8rem;
      color: var(--muted);
      font-style: italic;
      margin-top: 0.1rem;
    }

    .track-bars {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 16px;
    }

    .track-bar {
      width: 3px;
      background: var(--amber);
      border-radius: 1px;
      opacity: 0.4;
      animation: barDance 1s ease infinite;
    }

    @keyframes barDance {
      0%, 100% { height: 4px; }
      50% { height: 16px; }
    }

    /* Action buttons */
    .actions {
      display: flex;
      gap: 1rem;
      animation: fadeUp 0.8s 1s ease both;
    }

    .share-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      background: var(--amber);
      color: var(--bg);
      padding: 1rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: none;
      cursor: none;
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
    }

    .share-btn:hover { background: var(--amber-light); }

    .retry-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      background: transparent;
      color: var(--muted);
      padding: 1rem 1.5rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: 1px solid var(--border);
      cursor: none;
      transition: all 0.2s ease;
    }

    .retry-btn:hover {
      border-color: var(--muted);
      color: var(--cream);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- Cursor -->
  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  <!-- Grain & Scanlines -->
  <div class="grain"></div>
  <div class="scanlines"></div>

  <!-- Particles -->
  <div class="particles" id="particles"></div>

  <!-- Vinyl BG -->
  <svg class="vinyl-bg" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="200" cy="200" r="199" stroke="#c8873a" stroke-width="0.5"/>
    <circle cx="200" cy="200" r="180" stroke="#c8873a" stroke-width="0.5"/>
    <circle cx="200" cy="200" r="160" stroke="#c8873a" stroke-width="0.5"/>
    <circle cx="200" cy="200" r="140" stroke="#c8873a" stroke-width="0.5"/>
    <circle cx="200" cy="200" r="120" stroke="#c8873a" stroke-width="0.5"/>
    <circle cx="200" cy="200" r="100" stroke="#c8873a" stroke-width="0.5"/>
    <circle cx="200" cy="200" r="80" stroke="#c8873a" stroke-width="0.5"/>
    <circle cx="200" cy="200" r="60" stroke="#c8873a" stroke-width="0.5"/>
    <circle cx="200" cy="200" r="40" stroke="#c8873a" stroke-width="1"/>
    <circle cx="200" cy="200" r="20" fill="#c8873a" opacity="0.3"/>
    <circle cx="200" cy="200" r="8" fill="#c8873a"/>
  </svg>

  <!-- LOGIN PAGE -->
  <div class="page active" id="login-page">
    <div class="login-page">
      <div class="tape-label">Side A — Your Sound</div>

      <div class="vinyl-record">
        <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="100" cy="100" r="99" fill="#111" stroke="#2a2218" stroke-width="1"/>
          <circle cx="100" cy="100" r="85" stroke="#1e1a14" stroke-width="1"/>
          <circle cx="100" cy="100" r="70" stroke="#1e1a14" stroke-width="1"/>
          <circle cx="100" cy="100" r="55" stroke="#1e1a14" stroke-width="1"/>
          <circle cx="100" cy="100" r="40" stroke="#1e1a14" stroke-width="1"/>
          <circle cx="100" cy="100" r="30" fill="#c8873a" opacity="0.15"/>
          <circle cx="100" cy="100" r="20" fill="#1a1610" stroke="#c8873a" stroke-width="1"/>
          <circle cx="100" cy="100" r="6" fill="#c8873a"/>
        </svg>
        <!-- Needle -->
        <svg class="needle" viewBox="0 0 60 60" fill="none">
          <line x1="55" y1="5" x2="30" y2="45" stroke="#c8873a" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="55" cy="5" r="4" fill="#c8873a"/>
          <circle cx="30" cy="46" r="2" fill="#c8873a" opacity="0.7"/>
        </svg>
      </div>

      <h1 class="main-title">Music<span>Personality</span></h1>
      <div class="deco-line"></div>
      <p class="subtitle">What does your taste say about your soul?</p>

      <button class="login-btn" id="loginBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
        </svg>
        <span>Play My Record</span>
      </button>
      <p class="fine-print">We only read your listening history, nothing else.</p>
    </div>
  </div>

  <!-- LOADING PAGE -->
  <div class="page hidden" id="loading-page">
    <div class="loading-page">
      <div class="turntable">
        <svg class="turntable-vinyl" viewBox="0 0 200 200" fill="none">
          <circle cx="100" cy="100" r="99" fill="#111" stroke="#2a2218"/>
          <circle cx="100" cy="100" r="80" stroke="#1e1a14" stroke-width="2"/>
          <circle cx="100" cy="100" r="60" stroke="#1e1a14" stroke-width="1.5"/>
          <circle cx="100" cy="100" r="40" stroke="#1e1a14" stroke-width="1"/>
          <circle cx="100" cy="100" r="25" fill="#c8873a" opacity="0.2"/>
          <circle cx="100" cy="100" r="12" fill="#c8873a"/>
          <circle cx="100" cy="100" r="4" fill="#0d0b08"/>
        </svg>
      </div>
      <div class="loading-text">Reading your grooves...</div>
      <p class="loading-subtext">Analyzing your sonic soul</p>
    </div>
  </div>

  <!-- RESULT PAGE -->
  <div class="page hidden" id="result-page">
    <div class="result-page" id="result-content">

      <div class="personality-card">
        <div class="card-header">
          <span class="card-header-text">Music Personality Report</span>
          <div class="card-holes">
            <div class="card-hole"></div>
            <div class="card-hole"></div>
            <div class="card-hole"></div>
          </div>
        </div>
        <div class="card-body">
          <span class="card-emoji" id="card-emoji"></span>
          <div class="card-type">Your Sonic Archetype</div>
          <div class="card-title" id="card-title"></div>
          <div class="card-description" id="card-description"></div>
        </div>
        <div class="card-footer">
          <span class="card-footer-text">Powered by ML + LLM</span>
          <span class="rpm-badge">33 ⅓ RPM</span>
        </div>
      </div>

      <div class="tracks-card">
        <div class="tracks-header">
          <div class="tracks-header-dot"></div>
          <span class="tracks-header-text">Now Playing — Your Top Tracks</span>
        </div>
        <div class="track-list" id="track-list"></div>
      </div>

      <div class="actions">
        <button class="share-btn" id="shareBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
            <polyline points="16 6 12 2 8 6"/>
            <line x1="12" y1="2" x2="12" y2="15"/>
          </svg>
          Share Your Side
        </button>
        <button class="retry-btn" id="retryBtn">↩ Flip</button>
      </div>

    </div>
  </div>

  <script>
    // Custom cursor
    const cursor = document.getElementById('cursor');
    const cursorRing = document.getElementById('cursorRing');
    document.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';
      setTimeout(() => {
        cursorRing.style.left = e.clientX + 'px';
        cursorRing.style.top = e.clientY + 'px';
      }, 80);
    });

    // Particles
    const particlesContainer = document.getElementById('particles');
    for (let i = 0; i < 20; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.animationDuration = (8 + Math.random() * 15) + 's';
      p.style.animationDelay = (Math.random() * 10) + 's';
      p.style.width = (Math.random() > 0.7 ? 3 : 2) + 'px';
      p.style.height = p.style.width;
      particlesContainer.appendChild(p);
    }

    // Track bar animations with random delays
    function addBarDelays() {
      document.querySelectorAll('.track-bar').forEach((bar, i) => {
        bar.style.animationDelay = (Math.random() * 0.5) + 's';
        bar.style.animationDuration = (0.6 + Math.random() * 0.8) + 's';
      });
    }

    // Page switching
    function showPage(pageId) {
      document.querySelectorAll('.page').forEach(p => {
        p.classList.remove('active');
        p.classList.add('hidden');
      });
      const page = document.getElementById(pageId);
      page.classList.remove('hidden');
      setTimeout(() => page.classList.add('active'), 10);
    }

    // Login button
    document.getElementById('loginBtn').addEventListener('click', () => {
      showPage('loading-page');
      setTimeout(() => { window.location.href = '/login'; }, 600);
    });

    // Retry button
    document.getElementById('retryBtn').addEventListener('click', () => {
      showPage('login-page');
      setTimeout(() => { window.location.href = '/'; }, 300);
    });

    // Share button
    document.getElementById('shareBtn').addEventListener('click', () => {
      const title = document.getElementById('card-title').textContent;
      const desc = document.getElementById('card-description').textContent;
      const emoji = document.getElementById('card-emoji').textContent;
      navigator.clipboard.writeText(`${emoji} I'm "${title}"\n\n${desc}\n\nDiscover yours → music-personality.app`);
      const btn = document.getElementById('shareBtn');
      btn.textContent = '✓ Copied to Clipboard';
      setTimeout(() => btn.textContent = '↑ Share Your Side', 2000);
    });

    // Show result
    function showResult(data) {
      showPage('result-page');
      document.getElementById('result-content').style.display = 'flex';

      document.getElementById('card-emoji').textContent = data.personality.emoji || '🎵';
      document.getElementById('card-title').textContent = data.personality.title;
      document.getElementById('card-description').textContent = data.personality.description;

      const trackList = document.getElementById('track-list');
      data.top_tracks.forEach((track, i) => {
        const bars = [1,2,3].map(b =>
          `<div class="track-bar" style="height:${4 + Math.random()*12}px"></div>`
        ).join('');
        trackList.innerHTML += `
          <div class="track-item" style="animation-delay:${i * 0.1}s">
            <span class="track-num">0${i+1}</span>
            <div class="track-info">
              <div class="track-name">${track.name}</div>
              <div class="track-artist">${track.artist}</div>
            </div>
            <div class="track-bars">${bars}</div>
          </div>`;
      });

      addBarDelays();
    }

    // Check for data in URL
    const params = new URLSearchParams(window.location.search);
    if (params.get('data')) {
      try {
        const data = JSON.parse(decodeURIComponent(params.get('data')));
        showResult(data);
      } catch(e) {
        console.error('Failed to parse data:', e);
      }
    }
  </script>
</body>
</html>
